<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Edit room</title>
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <a href="/rooms/show" id="btn">Back</a>
    <h2 style="text-align: center">Edit Room</h2>

    <form action="" method="post" class="edit">
      <label for="num">Number</label>
      <input type="text" id="num" name="num" placeholder="Room number..." />

      <label for="price">Price per night (MAD)</label>
      <input type="text" id="price" name="price" placeholder="Room price..." />

      <label for="status">Status</label>
      <select name="status" id="status">
        <option value="">Choose status...</option>
        <option value="active">Active</option>
        <option value="inactive">Inactive</option>
      </select>

      <!-- !!! Add image after time !!! -->

      <!-- <label for="card_id">Card ID</label>
      <input type="text" id="card_id" name="card_id" placeholder="Card ID..." /> -->

      <!-- !!! Add image after time !!! -->

      <button type="submit">Add</button>
    </form>
    <h6 id="load">Loading...</h6>
  </body>
  <script>
    const fetchData = async (url) => {
      try {
        const response = await fetch(url);
        if (!response.ok) {
          console.error(`Response status: ${response.status}`);
          return;
        }
        const result = await response.json();
        return result;
      } catch (error) {
        console.error(error.message);
        return false;
      }
    };

    const id = location.pathname.split("/").pop();
    const numInput = document.getElementById("num");
    const priceInput = document.getElementById("price");
    const statusDropDown = document.getElementById("status");
    fetchData(`/api/rooms/edit/${id}`)
      .then((result) => {
        console.log(result);
        const { number, price_per_night, status } = result.room;
        numInput.value = number;
        priceInput.value = price_per_night;
        statusDropDown.value = status;
      })
      .catch((err) => {
        console.error("Something wrong:", err);
      })
      .finally(() => {
        document.getElementById("load").style.display = "none";
      });
  </script>
</html>
